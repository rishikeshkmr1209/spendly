{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">

    <div class="auth-header">
      <h1 class="auth-title">Add Expense</h1>
      <p class="auth-subtitle">Record a new expense to your account</p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('add_expense') }}">

        <div class="form-group">
          <label for="amount">Amount (&#8377;)</label>
          <input type="number" id="amount" name="amount" class="form-input"
                 step="0.01" min="0.01" placeholder="0.00"
                 value="{{ amount or '' }}" required autofocus>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input" required>
            <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
            {% for cat in valid_categories %}
            <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" class="form-input"
                 value="{{ date or today }}" required>
        </div>

        <div class="form-group">
          <label for="description">
            Description <span class="form-optional">(optional)</span>
          </label>
          <input type="text" id="description" name="description" class="form-input"
                 placeholder="e.g. Groceries at Big Bazaar"
                 maxlength="200" value="{{ description or '' }}">
        </div>

        <button type="submit" class="btn-submit">Save Expense</button>
      </form>
    </div>

    <p class="auth-switch">
      <a href="{{ url_for('profile') }}">&#8592; Back to dashboard</a>
    </p>

  </div>
</section>
{% endblock %}
